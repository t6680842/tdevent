<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketDive Event Viewer</title>
<script src="https://cdn.tailwindcss.com">window.addEventListener('resize',()=>{if(lastData) render(lastData);});
window.addEventListener('orientationchange',()=>{if(lastData) render(lastData);});
</script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">
<div class="max-w-full mx-auto space-y-6"><div class="bg-slate-800 rounded-2xl shadow p-6 space-y-4"><h1 class="text-2xl font-bold">TicketDive Event Viewer</h1><input id="event" class="border border-slate-600 bg-slate-700 text-slate-100 rounded-xl p-3 w-full" placeholder="event_id または https://ticketdive.com/event/12345"><button onclick="loadData()" class="bg-blue-500 text-white rounded-xl px-4 py-3 w-full">取得</button><div id="status" class="text-sm text-slate-300"></div></div><div id="eventBlock"></div><div class="bg-slate-800 rounded-2xl shadow p-6"><h2 class="text-xl font-bold mb-4">チケット情報</h2><div id="tableBlock" class="overflow-auto"></div></div></div><div id="modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onclick="closeModal()">
<img id="modalImg" class="max-w-full max-h-full rounded-xl">
</div>
<script>
const PROXY_URL='https://wild-hill-606c.kshin0225.workers.dev';const esc=v=>String(v??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));const fmtJST=v=>{if(!v)return'';const d=new Date(v);if(isNaN(d))return v;const w=['日','月','火','水','木','金','土'][d.toLocaleString('en-US',{timeZone:'Asia/Tokyo',weekday:'short'})==='Sun'?0:d.getDay()];return d.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+'('+w+')';};function findKey(o,k){if(!o||typeof o!=='object')return null;if(o[k]!==undefined)return o[k];for(const x in o){const r=findKey(o[x],k);if(r!==null)return r;}return null;}const findEvent=o=>(o?.pageProps?.eventDetail?.event)||(o?.eventDetail?.event)||findKey(o,'event')||findKey(o,'eventData');const findStages=o=>(o?.pageProps?.eventDetail?.stages)||(o?.eventDetail?.stages)||findKey(o,'stages')||[];const findTicket=o=>(o?.pageProps?.eventDetail?.チケット情報)||(o?.eventDetail?.チケット情報)||findKey(o,'チケット情報')||[];function openModal(src){document.getElementById('modalImg').src=src;document.getElementById('modal').classList.remove('hidden');}function closeModal(){document.getElementById('modal').classList.add('hidden');}let lastData=null;
async function loadData(){let id=document.getElementById('event').value.trim();const m=id.match(/ticketdive\.com\/event\/([^/?#]+)/);if(m)id=m[1];if(!id)return alert('入力してください');const st=document.getElementById('status');st.textContent='取得中...';try{const r=await fetch(PROXY_URL+'?event='+encodeURIComponent(id));const data=await r.json();lastData=data;render(data);st.textContent='取得完了';}catch(e){st.textContent='エラー:'+e.message;}}function render(data){renderEvent(data);renderTable(data);}function renderEvent(data){const ev=findEvent(data)||{};const stages=findStages(data);let venue='',open='',start='',artists='';if(stages.length){const s=stages[0];venue=(s.venue&&s.venue.name)||s.stageName||'';open=fmtJST(s.openVenue);start=fmtJST(s.startStage);artists=(s.artists||[]).map(a=>a.name).join(', ');}const imgs=[ev.topImage,...(ev.additionalImages||[])].filter(Boolean).map(u=>`<img src="${u}" onclick="openModal('${u}')" class="h-32 object-cover rounded-xl cursor-pointer border border-slate-600">`).join('');document.getElementById('eventBlock').innerHTML=`<div class="bg-slate-800 rounded-2xl shadow p-6 space-y-4"><div class="grid grid-cols-2 sm:grid-cols-3 gap-2">${imgs}</div><div class="text-2xl font-bold">${esc(ev.name||'')}</div><div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm"><div><b>会場:</b> ${esc(venue)}</div><div><b>開場:</b> ${esc(open)}</div><div><b>開演:</b> ${esc(start)}</div><div><b>出演:</b> ${esc(artists)}</div><div class="md:col-span-2"><b>URL:</b> <a class="text-blue-600 underline" target="_blank" href="https://ticketdive.com/event/${esc(ev.url||'')}">https://ticketdive.com/event/${esc(ev.url||'')}</a></div></div><div class="whitespace-pre-wrap text-sm text-slate-200 border-t pt-3">${esc(ev.detail||'')}</div></div>`;}function renderTable(data){
const list=findTicket(data);
const el=document.getElementById('tableBlock');
if(!Array.isArray(list)||!list.length){el.innerHTML='なし';return;}
const mobile=window.innerWidth<640;
if(mobile){
 let html='';
 for(const g of list){
  const q=(g.customize||g.customizeList||[]).map(i=>{
   const opts=(i.selectOptions||[]).filter(x=>!x.hidden).map(x=>x.value).join(', ');
   return '<div class="mt-1"><b>'+esc(i.label||'')+'</b><br>'+esc(opts)+'</div>';
  }).join('') || 'なし';
  for(const t of (g.ticketTypes||[])){
   html+=`<div class="bg-slate-800 border border-slate-600 rounded-xl shadow p-3 mb-3 space-y-1 text-sm">
   <div class="font-bold text-base">${esc(g.name||'')} / ${esc(t.name||'')}</div>
   <div><b>詳細:</b> ${esc(t.detail||'')}</div>
   <div><b>最大購入可能枚数:</b> ${esc(t.maxNumPerApply||'')}</div>
   <div><b>状態:</b> ${esc(t.status||g.status||'')}</div>
   <div><b>販売開始日時:</b> ${fmtJST(g.startApply||g.release)}</div>
   <div><b>アンケート:</b> ${q}</div>
   </div>`;
  }
 }
 el.innerHTML=html;
 return;
}
let html='<table class="w-full text-xs sm:text-sm border border-slate-600"><thead><tr class="bg-slate-700"><th class="border border-slate-600 p-1 sm:p-2">販売枠</th><th class="border border-slate-600 p-1 sm:p-2">券種</th><th class="border border-slate-600 p-1 sm:p-2">詳細</th><th class="border border-slate-600 p-1 sm:p-2">最大購入可能枚数</th><th class="border border-slate-600 p-1 sm:p-2">状態</th><th class="border border-slate-600 p-1 sm:p-2">販売開始日時</th><th class="border border-slate-600 p-1 sm:p-2">アンケート</th></tr></thead><tbody>';
for(const g of list){
 const q=(g.customize||g.customizeList||[]).map(i=>{
  const opts=(i.selectOptions||[]).filter(x=>!x.hidden).map(x=>x.value).join(', ');
  return '<div><b>'+esc(i.label||'')+'</b><br>'+esc(opts)+'</div>';
 }).join('') || 'なし';
 for(const t of (g.ticketTypes||[])){
  html+=`<tr><td class="border border-slate-600 p-1 sm:p-2">${esc(g.name||'')}</td><td class="border border-slate-600 p-1 sm:p-2">${esc(t.name||'')}</td><td class="border border-slate-600 p-1 sm:p-2">${esc(t.detail||'')}</td><td class="border border-slate-600 p-1 sm:p-2">${esc(t.maxNumPerApply||'')}</td><td class="border border-slate-600 p-1 sm:p-2">${esc(t.status||g.status||'')}</td><td class="border border-slate-600 p-1 sm:p-2">${fmtJST(g.startApply||g.release)}</td><td class="border border-slate-600 p-1 sm:p-2">${q}</td></tr>`;
 }
}
html+='</tbody></table>';
el.innerHTML=html;
}
</script>
</body>
</html>
