<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketDive Event Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6">
<div class="max-w-5xl mx-auto bg-white rounded-2xl shadow p-6 space-y-4">
<h1 class="text-2xl font-bold">TicketDive Event Viewer</h1>
<p class="text-sm text-slate-600">event URL または event_id を入力して取得してください。</p>
<div class="grid md:grid-cols-1 gap-4">
<input id="event" class="border rounded-xl p-3" placeholder="event_id または https://ticketdive.com/event/12345">
</div>
<button onclick="loadData()" class="bg-blue-600 text-white rounded-xl px-4 py-3 w-full">取得</button>
<div id="status" class="text-sm text-slate-600"></div>
<div class="grid md:grid-cols-2 gap-6">
<div>
<h2 class="font-semibold mb-2">概要</h2>
<div id="summary" class="space-y-2 text-sm"></div>
</div>
<div>
<h2 class="font-semibold mb-2">チケット</h2>
<div id="tickets" class="space-y-2 text-sm"></div>
</div>
</div>
<div>
<h2 class="font-semibold mb-2">ticketInfoList</h2>
<div id="json" class="overflow-auto"></div>
</div>
</div>
<script>
function esc(v){return String(v ?? '').replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];});}

async function loadData(){
  const proxy = 'https://wild-hill-606c.kshin0225.workers.dev';
  let eventId = document.getElementById('event').value.trim();
  const m = eventId.match(/ticketdive\.com\/event\/([^/?#]+)/);
  if(m){ eventId = m[1]; }
  const status = document.getElementById('status');

  if(!eventId){
    alert('event URL または event_id を入力してください');
    return;
  }

  status.textContent = '取得中...';
  document.getElementById('summary').innerHTML = '';
  document.getElementById('tickets').innerHTML = '';

  try {
    const res = await fetch(proxy + '?event=' + encodeURIComponent(eventId));
    if(!res.ok){
      throw new Error('HTTP ' + res.status);
    }

    const data = await res.json();
    render(data);
    status.textContent = '取得完了';
  } catch(e) {
    status.textContent = 'エラー: ' + e.message;
  }
}

function render(data){
  renderTicketTable(data);

  const page = data.pageProps || (data.props ? data.props.pageProps : null) || data;
  const ev = page.event || page;

  document.getElementById('summary').innerHTML =
    '<div><b>タイトル:</b> ' + esc(ev.title || '') + '</div>' +
    '<div><b>会場:</b> ' + esc(ev.placeName || ev.place || '') + '</div>' +
    '<div><b>日時:</b> ' + esc(ev.startAt || ev.startDate || '') + '</div>';

  const tickets = ev.ticketTypes || ev.tickets || [];

  if(!tickets.length){
    document.getElementById('tickets').innerHTML = 'なし';
    return;
  }

  let html = '';
  for(let i=0;i<tickets.length;i++){
    const t = tickets[i];
    html += '<div class="border rounded-xl p-3 mb-2">' +
      '<div><b>' + esc(t.name || '') + '</b></div>' +
      '<div>価格: ' + esc(t.price || '') + '</div>' +
      '<div>在庫: ' + esc(t.stock || '') + '</div>' +
      '</div>';
  }

  document.getElementById('tickets').innerHTML = html;
}

function fmtJST(v){
  if(!v) return '';
  const d=new Date(v);
  if(isNaN(d)) return esc(v);
  return d.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function findTicketInfoList(obj){
  if(!obj || typeof obj !== 'object') return [];
  if(Array.isArray(obj.ticketInfoList)) return obj.ticketInfoList;
  for(const key in obj){
    const found = findTicketInfoList(obj[key]);
    if(found && found.length) return found;
  }
  return [];
}

function renderTicketTable(data){
  const list = findTicketInfoList(data);
  const target = document.getElementById('json');
  if(!list.length){ target.innerHTML='<div class="text-sm text-slate-500">ticketInfoList なし</div>'; return; }
  let html='<table class="min-w-full text-sm border border-slate-300"><thead><tr class="bg-slate-100"><th class="border p-2">販売枠</th><th class="border p-2">券種</th><th class="border p-2">詳細</th><th class="border p-2">最大購入可能枚数</th><th class="border p-2">状態</th><th class="border p-2">販売開始(JST)</th><th class="border p-2">販売終了(JST)</th><th class="border p-2">アンケート</th></tr></thead><tbody>';
  for(let i=0;i<list.length;i++){
    const group=list[i];
    const types=group.ticketTypes||[];
    const customs=group.customize||group.customizeList||[];
    let customText='';
    for(let c=0;c<customs.length;c++){
      const item=customs[c];
      const opts=(item.selectOptions||[]).filter(o=>!o.hidden).map(o=>o.value).join(', ');
      customText += (c?'<hr>':'') + '<b>'+esc(item.label||'')+'</b><br>'+esc(opts);
    }
    if(customText){ customText = '<details><summary class="cursor-pointer text-blue-600">表示</summary><div class="mt-2">'+customText+'</div></details>'; }
    if(!types.length){
      html+='<tr><td class="border p-2">'+esc(group.name||'')+'</td><td class="border p-2"></td><td class="border p-2"></td><td class="border p-2"></td><td class="border p-2">'+esc(group.status||'')+'</td><td class="border p-2">'+fmtJST(group.startApply||group.release||'')+'</td><td class="border p-2">'+fmtJST(group.endApply||'')+'</td><td class="border p-2">'+customText+'</td></tr>';
    }
    for(let j=0;j<types.length;j++){
      const t=types[j];
      html+='<tr><td class="border p-2">'+esc(group.name||'')+'</td><td class="border p-2">'+esc(t.name||'')+'</td><td class="border p-2">'+esc(t.detail||'')+'</td><td class="border p-2">'+esc(t.maxNumPerApply||'')+'</td><td class="border p-2">'+esc(t.status||group.status||'')+'</td><td class="border p-2">'+fmtJST(group.startApply||group.release||'')+'</td><td class="border p-2">'+fmtJST(group.endApply||'')+'</td><td class="border p-2">'+customText+'</td></tr>';
    }
  }
  html+='</tbody></table>';
  target.innerHTML=html;
}
</script>
</body>
</html>
