<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketDive Event Viewer</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
function renderCountdown(data){
 const el=document.getElementById('countdown');
 if(!el) return;
 const list=findTicket(data);
 let future=[];
 for(const g of list){
   const d=new Date(g.startApply);
   if(!isNaN(d)) future.push(d);
 }
 future.sort((a,b)=>a-b);
 if(!future.length){el.textContent='';return;}
 const now=new Date();
 let target=future.find(x=>x>now)||future[0];

 function tick(){
   const diff=target-new Date();
   if(diff<=0){
     el.textContent='販売中';
     el.className='text-lg font-bold text-emerald-400';
     return;
   }
   const dd=Math.floor(diff/86400000);
   const hh=Math.floor(diff%86400000/3600000);
   const mm=Math.floor(diff%3600000/60000);
   const ss=Math.floor(diff%60000/1000);

   el.textContent='販売開始まで あと '+(dd?dd+'日 ':'')+hh+'時間 '+mm+'分 '+ss+'秒';

   if(diff<=600000){
     el.className='text-lg font-bold text-red-400 animate-pulse';
   }else if(diff<=3600000){
     el.className='text-lg font-bold text-yellow-300';
   }else{
     el.className='text-lg font-bold text-emerald-400';
   }
 }

 tick();
 clearInterval(window.__cdTimer);
 window.__cdTimer=setInterval(tick,1000);
}

window.addEventListener('resize',()=>{if(window.lastData) render(window.lastData);});
window.addEventListener('orientationchange',()=>{if(window.lastData) render(window.lastData);});
</script>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

<div class="max-w-full mx-auto space-y-6">

<div class="bg-slate-800 rounded-2xl shadow p-6 space-y-4">
<h1 class="text-2xl font-bold">TicketDive Event</h1>

<input id="event" class="border border-slate-600 bg-slate-700 text-slate-100 rounded-xl p-3 w-full"
placeholder="event_id または https://ticketdive.com/event/12345">

<button onclick="loadData()" class="bg-blue-500 text-white rounded-xl px-4 py-3 w-full">
取得
</button>

<div id="status" class="text-sm text-slate-300"></div>
<div id="countdown" class="text-lg font-bold text-emerald-400"></div>
</div>

<div id="eventBlock"></div>

<div class="bg-slate-800 rounded-2xl shadow p-6">
<h2 class="text-xl font-bold mb-4">チケット情報</h2>
<div id="tableBlock" class="overflow-auto"></div>
</div>

</div>

<div id="modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onclick="closeModal()">
<img id="modalImg" class="max-w-full max-h-full rounded-xl">
</div>

<script>

const PROXY_URL='https://wild-hill-606c.kshin0225.workers.dev';

const esc=v=>String(v??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

const fmtJST=v=>{
 if(!v)return'';
 const d=new Date(v);
 if(isNaN(d))return v;
 return d.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'});
};

function findKey(o,k){
 if(!o||typeof o!=='object')return null;
 if(o[k]!==undefined)return o[k];
 for(const x in o){
   const r=findKey(o[x],k);
   if(r!==null)return r;
 }
 return null;
}

const findEvent=o=>(o?.pageProps?.eventDetail?.event)||(o?.eventDetail?.event)||findKey(o,'event');

const findStages=o=>(o?.pageProps?.eventDetail?.stages)||(o?.eventDetail?.stages)||findKey(o,'stages')||[];

function findTicket(o){
 const candidates=[
  o?.pageProps?.eventDetail?.ticketInfoList,
  o?.eventDetail?.ticketInfoList,
  findKey(o,'ticketInfoList')
 ];
 for(const c of candidates){
  if(Array.isArray(c)&&c.length) return c;
 }
 return [];
}

function openModal(src){
 document.getElementById('modalImg').src=src;
 document.getElementById('modal').classList.remove('hidden');
}

function closeModal(){
 document.getElementById('modal').classList.add('hidden');
}

let lastData=null;

async function loadData(){

 let id=document.getElementById('event').value.trim();

 const m=id.match(/ticketdive\.com\/event\/([^/?#]+)/);
 if(m) id=m[1];

 if(!id){
   alert('入力してください');
   return;
 }

 const st=document.getElementById('status');
 st.textContent='取得中...';

 try{

   const r=await fetch(PROXY_URL+'?event='+encodeURIComponent(id));
   const data=await r.json();

   lastData=data;
   render(data);

   st.textContent='取得完了';

 }catch(e){
   st.textContent='エラー:'+e.message;
 }

}

function render(data){
 renderEvent(data);
 renderTable(data);
 renderCountdown(data);
}

function renderEvent(data){

 const ev=findEvent(data)||{};
 const stages=findStages(data);

 let venue='',open='',start='',artists='';

 if(stages.length){
  const s=stages[0];
  venue=(s.venue&&s.venue.name)||'';
  open=fmtJST(s.openVenue);
  start=fmtJST(s.startStage);
  artists=(s.artists||[]).map(a=>a.name).join(', ');
 }

 document.getElementById('eventBlock').innerHTML=`
 <div class="bg-slate-800 rounded-2xl shadow p-6 space-y-4">
   <div class="text-2xl font-bold">${esc(ev.name||'')}</div>
   <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
   <div><b>会場:</b> ${esc(venue)}</div>
   <div><b>開場:</b> ${esc(open)}</div>
   <div><b>開演:</b> ${esc(start)}</div>
   <div><b>出演:</b> ${esc(artists)}</div>
   </div>
 </div>`;
}

function renderTable(data){

 const list=findTicket(data);
 const el=document.getElementById('tableBlock');

 if(!Array.isArray(list)||!list.length){
  el.innerHTML='なし';
  return;
 }

 let html='<table class="w-full text-sm border border-slate-600">';
 html+='<thead><tr class="bg-slate-700">';
 html+='<th class="border p-2">販売枠</th>';
 html+='<th class="border p-2">券種</th>';
 html+='<th class="border p-2">最大購入可能枚数</th>';
 html+='<th class="border p-2">販売開始</th>';
 html+='</tr></thead><tbody>';

 for(const g of list){
  for(const t of (g.ticketTypes||[])){
   html+=`<tr>
   <td class="border p-2">${esc(g.name)}</td>
   <td class="border p-2">${esc(t.name)}</td>
   <td class="border p-2">${esc(t.maxNumPerApply||'')}</td>
   <td class="border p-2">${fmtJST(g.startApply)}</td>
   </tr>`;
  }
 }

 html+='</tbody></table>';

 el.innerHTML=html;

}

</script>

</body>
</html>
