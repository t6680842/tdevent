<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketDive Event Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6">
<div class="max-w-5xl mx-auto bg-white rounded-2xl shadow p-6 space-y-4">
<h1 class="text-2xl font-bold">TicketDive Event Viewer</h1>
<p class="text-sm text-slate-600">Cloudflare Workers Proxy URL と event_id を入力して取得してください。</p>
<div class="grid md:grid-cols-3 gap-4">
<input id="proxy" class="border rounded-xl p-3 md:col-span-2" placeholder="https://your-worker.workers.dev">
<input id="event" class="border rounded-xl p-3" placeholder="event_id">
</div>
<button onclick="loadData()" class="bg-blue-600 text-white rounded-xl px-4 py-3 w-full">取得</button>
<div id="status" class="text-sm text-slate-600"></div>
<div class="grid md:grid-cols-2 gap-6">
<div>
<h2 class="font-semibold mb-2">概要</h2>
<div id="summary" class="space-y-2 text-sm"></div>
</div>
<div>
<h2 class="font-semibold mb-2">チケット</h2>
<div id="tickets" class="space-y-2 text-sm"></div>
</div>
</div>
<div>
<h2 class="font-semibold mb-2">JSON</h2>
<pre id="json" class="bg-slate-900 text-slate-100 rounded-xl p-4 overflow-auto text-xs min-h-64"></pre>
</div>
</div>
<script>
function esc(v){return String(v ?? '').replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];});}

async function loadData(){
  const proxy = document.getElementById('proxy').value.trim();
  const eventId = document.getElementById('event').value.trim();
  const status = document.getElementById('status');

  if(!proxy || !eventId){
    alert('proxy URL と event_id を入力してください');
    return;
  }

  status.textContent = '取得中...';
  document.getElementById('summary').innerHTML = '';
  document.getElementById('tickets').innerHTML = '';

  try {
    const res = await fetch(proxy + '?event=' + encodeURIComponent(eventId));
    if(!res.ok){
      throw new Error('HTTP ' + res.status);
    }

    const data = await res.json();
    render(data);
    status.textContent = '取得完了';
  } catch(e) {
    status.textContent = 'エラー: ' + e.message;
  }
}

function render(data){
  document.getElementById('json').textContent = JSON.stringify(data, null, 2);

  const page = data.pageProps || (data.props ? data.props.pageProps : null) || data;
  const ev = page.event || page;

  document.getElementById('summary').innerHTML =
    '<div><b>タイトル:</b> ' + esc(ev.title || '') + '</div>' +
    '<div><b>会場:</b> ' + esc(ev.placeName || ev.place || '') + '</div>' +
    '<div><b>日時:</b> ' + esc(ev.startAt || ev.startDate || '') + '</div>';

  const tickets = ev.ticketTypes || ev.tickets || [];

  if(!tickets.length){
    document.getElementById('tickets').innerHTML = 'なし';
    return;
  }

  let html = '';
  for(let i=0;i<tickets.length;i++){
    const t = tickets[i];
    html += '<div class="border rounded-xl p-3 mb-2">' +
      '<div><b>' + esc(t.name || '') + '</b></div>' +
      '<div>価格: ' + esc(t.price || '') + '</div>' +
      '<div>在庫: ' + esc(t.stock || '') + '</div>' +
      '</div>';
  }

  document.getElementById('tickets').innerHTML = html;
}
</script>
</body>
</html>
